dataset:
  handler:
    class: Alpha158
    kwargs:
      end_time: '2020-02-01'
      fit_end_time: '2020-01-19'
      fit_start_time: '2020-01-01'
      infer_processors:
      - class: RobustZScoreNorm
        kwargs:
          clip_outlier: true
          fields_group: feature
      - class: Fillna
        kwargs:
          fields_group: feature
      instruments: csi300
      learn_processors:
      - class: DropnaLabel
      - class: CSRankNorm
        kwargs:
          fields_group: label
      start_time: '2020-01-01'
    module_path: qlib.contrib.data.handler
  segments:
    test:
    - '2020-01-25'
    - '2020-02-01'
    train:
    - '2020-01-01'
    - '2020-01-19'
    valid:
    - '2020-01-19'
    - '2020-01-25'
market: csi300
model:
  class: LGBModel
  kwargs:
    colsample_bytree: 0.8879
    lambda_l1: 205.6999
    lambda_l2: 580.9768
    learning_rate: 0.0421
    loss: mse
    max_depth: 8
    num_leaves: 210
    num_threads: 20
    subsample: 0.8789
  module_path: qlib.contrib.model.gbdt
port_analysis_config:
  backtest:
    account: 1000000
    benchmark: csi300
    end_time: '2020-02-01'
    exchange_kwargs:
      close_cost: 0.0015
      deal_price: close
      freq: day
      limit_threshold: 0.095
      min_cost: 5
      open_cost: 0.0005
    start_time: '2020-01-25'
  executor:
    class: SimulatorExecutor
    kwargs:
      generate_portfolio_metrics: true
      time_per_step: day
    module_path: qlib.backtest.executor
  strategy:
    class: TopkDropoutStrategy
    kwargs:
      n_drop: 5
      signal: <PRED>
      topk: 50
    module_path: qlib.contrib.strategy.signal_strategy
